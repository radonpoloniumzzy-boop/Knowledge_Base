{% extends "base.html" %}
{% block title %}资料导入 - 知识炼制台{% endblock %}
{% block content %}
<section class="page-head alchemy-head">
  <div>
    <p class="eyebrow">Alchemy chamber</p>
    <h1>炼金炉资料导入</h1>
    <p>核心处理成功后资料立即可用；分类、标签、SOP 与 Insight 随后独立炼制。</p>
  </div>
</section>

<section class="alchemy-workbench" data-alchemy-forge data-forge-state="idle">
  <div class="alchemy-visual" aria-hidden="true">
    <div class="alchemy-sigil"><span></span><i></i></div>
    <div class="alchemy-vessel">
      <div class="vessel-rim"></div>
      <div class="vessel-brew"><i></i><i></i><i></i></div>
      <div class="vessel-body"><span class="vessel-mark">KF</span></div>
    </div>
    <div class="alchemy-flame"><i></i><i></i><i></i></div>
    <div class="alchemy-embers"><i></i><i></i><i></i><i></i></div>
  </div>
  <form class="upload-box alchemy-upload" action="/ingest/upload" method="post" enctype="multipart/form-data" data-upload-form>
    <p class="alchemy-state-label" data-forge-label>炉火待命</p>
    <label class="alchemy-dropzone" for="files" data-dropzone>
      <svg class="guild-icon" aria-hidden="true"><use href="/static/guild-icons.svg#ingest"></use></svg>
      <strong>选择或拖放资料入炉</strong>
      <span>支持 md、txt、pdf、doc、docx、ppt、xlsx 等文档格式</span>
      <em data-file-selection>尚未选择文件</em>
    </label>
    <input class="sr-only" id="files" type="file" name="files" multiple data-file-input>
    <button class="btn primary" type="submit">加入炼制队列</button>
  </form>
</section>

<section class="panel process-panel">
  <div class="panel-head">
    <div><p class="panel-kicker">Persistent process</p><h2>工作进程</h2></div>
    <span id="job-refresh-status">自动更新</span>
  </div>
  <div id="job-queue">
    {% include "_job_queue.html" %}
  </div>
</section>
{% endblock %}
