<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}知识炼制台{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
  <link rel="stylesheet" href="/static/kiwi-theme.css">
  <script defer src="/static/guild-ui.js"></script>
</head>
<body data-page="{{ active }}">
  <a class="skip-link" href="#main-content">跳到主要内容</a>
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">KF</div>
      <div>
        <strong>知识炼制台</strong>
        <span>Knowledge Forge</span>
      </div>
    </div>
    <nav class="nav" aria-label="主导航">
      <a class="{{ 'active' if active == 'dashboard' else '' }}" href="/" {% if active == 'dashboard' %}aria-current="page"{% endif %}><svg class="app-icon" aria-hidden="true"><use href="/static/guild-icons.svg#dashboard"></use></svg><span>仪表盘</span></a>
      <a class="{{ 'active' if active == 'ingest' else '' }}" href="/ingest" {% if active == 'ingest' %}aria-current="page"{% endif %}><svg class="app-icon" aria-hidden="true"><use href="/static/guild-icons.svg#ingest"></use></svg><span>资料导入</span></a>
      <a class="{{ 'active' if active == 'library' else '' }}" href="/library" {% if active == 'library' %}aria-current="page"{% endif %}><svg class="app-icon" aria-hidden="true"><use href="/static/guild-icons.svg#library"></use></svg><span>知识库</span></a>
      <a class="{{ 'active' if active == 'packs' else '' }}" href="/packs" {% if active == 'packs' %}aria-current="page"{% endif %}><svg class="app-icon" aria-hidden="true"><use href="/static/guild-icons.svg#packs"></use></svg><span>能力包</span></a>
      <a class="{{ 'active' if active == 'recycle-bin' else '' }}" href="/recycle-bin" {% if active == 'recycle-bin' %}aria-current="page"{% endif %}><svg class="app-icon" aria-hidden="true"><use href="/static/guild-icons.svg#recycle"></use></svg><span>回收站</span></a>
      <a class="{{ 'active' if active == 'settings' else '' }}" href="/settings" {% if active == 'settings' %}aria-current="page"{% endif %}><svg class="app-icon" aria-hidden="true"><use href="/static/guild-icons.svg#settings"></use></svg><span>设置</span></a>
    </nav>
    <div class="sidebar-footer">
      <div class="status-dot"></div>
      <span>本地离线优先</span>
    </div>
  </aside>

  <main class="shell" id="main-content">
    <header class="topbar">
      <form class="search" action="/library" method="get">
        <svg class="app-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <label class="sr-only" for="global-search">搜索知识库</label>
        <input id="global-search" name="q" value="{{ q or '' }}" placeholder="搜索资料、标签或路径">
      </form>
      <div class="topbar-status"><span class="status-dot"></span>本地服务正常</div>
      <a class="btn primary" href="/ingest"><svg class="app-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14"/><path d="M5 12h14"/></svg>导入资料</a>
    </header>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
