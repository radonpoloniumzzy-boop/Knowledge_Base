<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}知识炼制台{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
  <link rel="stylesheet" href="/static/kiwi-theme.css">
</head>
<body data-page="{{ active }}">
  <a class="skip-link" href="#main-content">跳到主要内容</a>
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">KF</div>
      <div>
        <strong>知识炼制台</strong>
        <span>Knowledge Forge</span>
      </div>
    </div>
    <nav class="nav" aria-label="主导航">
      <a class="{{ 'active' if active == 'dashboard' else '' }}" href="/" {% if active == 'dashboard' %}aria-current="page"{% endif %}><svg class="app-icon" viewBox="0 0 24 24" aria-hidden="true"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg><span>仪表盘</span></a>
      <a class="{{ 'active' if active == 'ingest' else '' }}" href="/ingest" {% if active == 'ingest' %}aria-current="page"{% endif %}><svg class="app-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12"/><path d="m7 8 5-5 5 5"/><path d="M5 13v6a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-6"/></svg><span>资料导入</span></a>
      <a class="{{ 'active' if active == 'library' else '' }}" href="/library" {% if active == 'library' %}aria-current="page"{% endif %}><svg class="app-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2Z"/></svg><span>知识库</span></a>
      <a class="{{ 'active' if active == 'packs' else '' }}" href="/packs" {% if active == 'packs' %}aria-current="page"{% endif %}><svg class="app-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg><span>能力包</span></a>
      <a class="{{ 'active' if active == 'recycle-bin' else '' }}" href="/recycle-bin" {% if active == 'recycle-bin' %}aria-current="page"{% endif %}><svg class="app-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v5"/><path d="M14 11v5"/></svg><span>回收站</span></a>
      <a class="{{ 'active' if active == 'settings' else '' }}" href="/settings" {% if active == 'settings' %}aria-current="page"{% endif %}><svg class="app-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.38a2 2 0 0 0-.73-2.73l-.15-.09a2 2 0 0 1-1-1.74v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2Z"/><circle cx="12" cy="12" r="3"/></svg><span>设置</span></a>
    </nav>
    <div class="sidebar-footer">
      <div class="status-dot"></div>
      <span>本地离线优先</span>
    </div>
  </aside>

  <main class="shell" id="main-content">
    <header class="topbar">
      <form class="search" action="/library" method="get">
        <svg class="app-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <label class="sr-only" for="global-search">搜索知识库</label>
        <input id="global-search" name="q" value="{{ q or '' }}" placeholder="搜索资料、标签或路径">
      </form>
      <div class="topbar-status"><span class="status-dot"></span>本地服务正常</div>
      <a class="btn primary" href="/ingest"><svg class="app-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14"/><path d="M5 12h14"/></svg>导入资料</a>
    </header>
    {% block content %}{% endblock %}
  </main>
  <script>
    const activeNavItem = document.querySelector(".nav a.active");
    const mainNav = document.querySelector(".nav");
    if (activeNavItem && mainNav && window.matchMedia("(max-width: 760px)").matches) {
      mainNav.scrollLeft = Math.max(
        0,
        activeNavItem.offsetLeft - (mainNav.clientWidth - activeNavItem.offsetWidth) / 2
      );
    }
    document.addEventListener("submit", (event) => {
      if (event.defaultPrevented) return;
      const form = event.target;
      const button = form.querySelector("button[type='submit']");
      if (!button || button.disabled) return;
      window.setTimeout(() => {
        button.disabled = true;
        button.setAttribute("aria-busy", "true");
      }, 0);
    });
  </script>
</body>
</html>
